<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Lab - Modo Cinema</title>
    <style>
        :root {
            --bg: #0a0a0a; --panel: #1e1e1e;
            --accent: #ff6b35; --accent-hover: #fa5216;
            --text: #ffffff; --text-muted: #aaaaaa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 15px; overflow-x: hidden; justify-content: center; min-height: 100vh;}
        
        .back-btn { color: var(--text-muted); font-size: 1rem; text-decoration: none; border-bottom: 1px dotted var(--text-muted); transition: 0.3s;}
        .back-btn:hover { color: #fff; }

        .container {
            display: flex; gap: 15px; width: 100%; max-width: 1600px;
            flex-direction: column; align-items: center;
        }

        .player-section {
            background: var(--panel); border-radius: 12px; padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            width: 100%; display: flex; flex-direction: column; align-items: center;
        }
        
        /* Cabeçalho do Player interno */
        .player-header {
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; margin-bottom: 15px;
        }
        .header-spacer { width: 150px; } /* Spacer para manter o título perfeitamente centrado */
        
        #video-fundamento { color: var(--accent); font-size: 1.5rem; letter-spacing: 1px; text-align: center; text-transform: uppercase;}

        /* Layout em Linha (Botões LATERAIS) */
        .video-layout {
            display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 15px;
        }

        .video-wrapper {
            flex: 1; height: 80vh; min-height: 400px; background: #000; border-radius: 8px;
            display: flex; justify-content: center; align-items: center; position:relative; overflow: hidden;
        }
        
        video { width: 100%; height: 100%; object-fit: contain; }

        .side-btn {
            background: #2a2a2a; color: white; border: none; padding: 0 25px;
            border-radius: 8px; font-weight: bold; font-size: 2.5rem; cursor: pointer; transition: 0.3s;
            height: 40vh; min-height: 150px; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); user-select: none;
        }
        .side-btn:hover { background: var(--accent); color: #000; transform: scale(1.05); }
        .side-btn:active { transform: scale(0.95); }

        .counter { font-size: 1.5rem; font-weight: bold; color: var(--text-muted); text-align: center; margin-top: 15px; background: #111; padding: 5px 20px; border-radius: 20px;}

    </style>
</head>
<body>

    <div class="container">
        
        <div class="player-section">
            
            <div class="player-header">
                <a href="todos_videos.html" id="back-link" class="back-btn">⬅ Voltar para Galeria</a>
                <h2 id="video-fundamento">🎬 MODO CINEMA - CARREGANDO...</h2>
                <div class="header-spacer"></div>
            </div>

            <div class="video-layout">
                <button class="side-btn" onclick="changeVid(-1)" title="Anterior (Seta Esquerda)">&#10094;</button>
                
                <div class="video-wrapper">
                    <video id="video-player" controls autoplay loop playsinline>
                        <source id="video-source" src="" type="video/mp4">
                        Seu navegador não suporta vídeos.
                    </video>
                </div>
                
                <button class="side-btn" onclick="changeVid(1)" title="Próximo (Seta Direita)">&#10095;</button>
            </div>
            
            <div class="counter" id="counter">1 / X</div>
        </div>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const catParam = urlParams.get('cat'); // ex: "Drible"

        let playlist = [];
        let catFolder = '';
        let currentIndex = 0;

        const player = document.getElementById('video-player');
        const source = document.getElementById('video-source');
        const counter = document.getElementById('counter');
        const fundLabel = document.getElementById('video-fundamento');

        function loadVideo(index) {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            const currentFile = playlist[currentIndex];
            source.src = `../RepVid/${encodeURIComponent(catFolder)}/${encodeURIComponent(currentFile)}`;
            player.load();
            player.play().catch(() => {});
            counter.innerText = `${currentIndex + 1} / ${playlist.length}`;
            fundLabel.innerText = `🎬 MODO CINEMA — ${catFolder.toUpperCase()}`;
        }

        // Carrega o catalog.json e monta a playlist
        fetch('../RepVid/catalog.json')
            .then(r => r.json())
            .then(catalog => {
                if (catParam && catalog[catParam]) {
                    catFolder = catParam;
                    playlist = [...catalog[catParam]].sort();
                } else {
                    // Sem categoria: toca tudo em ordem
                    catFolder = 'todos';
                    Object.keys(catalog).forEach(cat => {
                        catalog[cat].sort().forEach(f => playlist.push({ file: f, cat }));
                    });
                    // Re-define loadVideo para multi-pasta
                    const origLoad = loadVideo;
                    loadVideo = function(index) {
                        if (index < 0 || index >= playlist.length) return;
                        currentIndex = index;
                        const item = playlist[currentIndex];
                        source.src = `../RepVid/${encodeURIComponent(item.cat)}/${encodeURIComponent(item.file)}`;
                        player.load();
                        player.play().catch(() => {});
                        counter.innerText = `${currentIndex + 1} / ${playlist.length}`;
                        fundLabel.innerText = `🎬 MODO CINEMA — ${item.cat.toUpperCase()}`;
                    };
                }
                loadVideo(0);
            })
            .catch(() => {
                fundLabel.innerText = '🎬 Erro ao carregar catálogo';
            });

        function changeVid(step) {
            let nextIndex = currentIndex + step;
            if (nextIndex >= 0 && nextIndex < playlist.length) {
                loadVideo(nextIndex);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changeVid(1);
            if (e.key === "ArrowLeft") changeVid(-1);
        });

    </script>
</body>
</html>
