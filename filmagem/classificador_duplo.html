<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador Lado-a-Lado - Football Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        h1 { color: #3b82f6; margin: 0; font-size: 2rem; text-transform: uppercase; font-weight: 900;}
        .time-badge {
            background: #559c31;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .video-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            height: 55vh;
        }
        .video-box {
            flex: 1;
            background: #000;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid #334155;
            position: relative;
        }
        .video-label {
            background: #334155;
            text-transform: uppercase;
            font-weight: 900;
            padding: 10px;
            font-size: 1.2rem;
            z-index: 10;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        input[type="text"] {
            font-size: 2rem;
            padding: 15px;
            border-radius: 10px;
            border: none;
            width: 70%;
            max-width: 800px;
            text-align: center;
            font-family: inherit;
            font-weight: 700;
        }
        .btn-group {
            display: flex;
            gap: 15px;
        }
        button {
            padding: 15px 30px;
            font-size: 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            color: #fff;
        }
        .btn-primary { background: #3b82f6; }
        .btn-primary:active { background: #2563eb; }
        .btn-secondary { background: #475569; }
        .btn-export { background: #559c31; margin-top: 10px; }
        
        /* Master play button */
        .master-play {
            background: #ef4444;
            font-size: 1.5rem;
            padding: 10px 40px;
            border-radius: 50px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Classificador Duplo - Football Lab</h1>
        <div class="time-badge" id="timeDisplay">10:35:28</div>
        <div style="font-size: 1.5rem; font-weight: 700;">Tomada: <span id="counterDisplay">1/216</span></div>
    </div>

    <!-- Master Play/Pause -->
    <button class="master-play" onclick="togglePlayAll()">⏯️ Tocar / Pausar Sincronizado</button>

    <div class="video-container" id="videoContainer">
        <!-- Renderizado dinamicamente pelo JS -->
    </div>

    <div class="controls">
        <input type="text" id="assunto" placeholder="Digite o Assunto (Ex: Passe Curto)">
        <div class="btn-group">
            <button class="btn-secondary" onclick="prevVideo()">⏮️ Anterior</button>
            <button class="btn-primary" onclick="salvarEAvancar()">Salvar e Avançar ⏭️</button>
            <button class="btn-secondary" onclick="pular()">Pular ⏭️</button>
        </div>
        <button class="btn-export" onclick="exportarScript()">💾 Baixar Script de Renomeio Definitivo (.ps1)</button>
    </div>

    <!-- Carrega o catálogo gerado pelo PowerShell -->
    <script src="catalogo_duplo.js"></script>

    <script>
        let currentIndex = parseInt(localStorage.getItem('fl_dual_index')) || 0;
        let classifications = JSON.parse(localStorage.getItem('fl_dual_classifications')) || [];
        
        const videoContainer = document.getElementById('videoContainer');
        const timeDisplay = document.getElementById('timeDisplay');
        const counterDisplay = document.getElementById('counterDisplay');
        const assuntoInput = document.getElementById('assunto');
        let playing = false;

        function renderCurrent() {
            if (currentIndex >= videosData.length) {
                videoContainer.innerHTML = '<h2>Todas as tomadas foram revisadas! Exporte o script.</h2>';
                return;
            }

            const item = videosData[currentIndex];
            timeDisplay.innerHTML = `🕒 ${item.Time}`;
            counterDisplay.innerText = (currentIndex + 1) + ' / ' + videosData.length;
            
            // Check if already classified
            const existing = classifications.find(c => c.index === currentIndex);
            if (existing) {
                assuntoInput.value = existing.assunto;
            } else {
                assuntoInput.value = '';
            }

            // Render videos
            videoContainer.innerHTML = '';
            playing = false;

            if (item.Type === 'Pair') {
                videoContainer.innerHTML = `
                    <div class="video-box">
                        <div class="video-label" style="background:#559c31;">🎥 Câmera 1 (Cartão 1)</div>
                        <video id="vid1" src="${item.V1}" loop muted></video>
                    </div>
                    <div class="video-box">
                        <div class="video-label" style="background:#3b82f6;">🎥 Câmera 2 (Cartão 2)</div>
                        <video id="vid2" src="${item.V2}" loop muted></video>
                    </div>
                `;
            } else {
                // Single
                const src = item.Card === 1 ? item.V1 : item.V2;
                const color = item.Card === 1 ? '#559c31' : '#3b82f6';
                videoContainer.innerHTML = `
                    <div class="video-box" style="flex: none; width: 60%;">
                        <div class="video-label" style="background:${color};">🎥 Câmera ${item.Card} (Cartão ${item.Card}) - Tomada Única</div>
                        <video id="vid1" src="${src}" loop controls></video>
                    </div>
                `;
            }
            assuntoInput.focus();
        }

        function togglePlayAll() {
            const v1 = document.getElementById('vid1');
            const v2 = document.getElementById('vid2');
            
            playing = !playing;
            
            if (v1 && !v1.controls) { playing ? v1.play() : v1.pause(); }
            if (v2 && !v2.controls) { playing ? v2.play() : v2.pause(); }
        }

        function salvarEAvancar() {
            const assunto = assuntoInput.value.trim().replace(/[^a-zA-Z0-9 -]/g, "");
            if (!assunto) {
                alert('Digite um assunto para classificar (sem caracteres especiais)!');
                return;
            }

            const item = videosData[currentIndex];
            
            // Remove existing classification if fixing
            classifications = classifications.filter(c => c.index !== currentIndex);
            
            classifications.push({
                index: currentIndex,
                assunto: assunto,
                v1: item.V1,
                v2: item.V2,
                type: item.Type,
                card: item.Card
            });

            localStorage.setItem('fl_dual_classifications', JSON.stringify(classifications));
            localStorage.setItem('fl_dual_index', currentIndex + 1);
            
            currentIndex++;
            renderCurrent();
        }

        function pular() {
            currentIndex++;
            localStorage.setItem('fl_dual_index', currentIndex);
            renderCurrent();
        }

        function prevVideo() {
            if (currentIndex > 0) {
                currentIndex--;
                localStorage.setItem('fl_dual_index', currentIndex);
                renderCurrent();
            }
        }

        function exportarScript() {
            if (classifications.length === 0) {
                alert("Nenhum vídeo classificado ainda!");
                return;
            }

            let script = "# Script Gerado pelo FL Classificador Duplo\\n";
            script += "# Execute este script no PowerShell para aplicar os nomes definitivamente.\\n\\n";

            classifications.forEach((c, idx) => {
                // O formato indexador para não haver nomes duplicados do mesmo assunto
                const timePrefix = String(idx+1).padStart(3, '0');

                // Decode URI
                const toWinPath = (uri) => {
                    if (!uri) return null;
                    let p = decodeURI(uri).replace('file:///', '');
                    return p.replace(/\\//g, '\\\\');
                };

                const makeSafeName = (name) => name.trim().replace(/ /g, '_');

                if (c.type === 'Pair') {
                    const p1 = toWinPath(c.v1);
                    const p2 = toWinPath(c.v2);
                    
                    const ext1 = p1.substring(p1.lastIndexOf('.'));
                    const ext2 = p2.substring(p2.lastIndexOf('.'));
                    
                    const newName1 = `${timePrefix}_${makeSafeName(c.assunto)}_cartao1${ext1}`;
                    const newName2 = `${timePrefix}_${makeSafeName(c.assunto)}_cartao2${ext2}`;

                    script += `Rename-Item -Path "${p1}" -NewName "${newName1}" -ErrorAction SilentlyContinue\\n`;
                    script += `Rename-Item -Path "${p2}" -NewName "${newName2}" -ErrorAction SilentlyContinue\\n`;
                } else {
                    const p1 = toWinPath(c.v1 || c.v2);
                    const ext1 = p1.substring(p1.lastIndexOf('.'));
                    const cam = c.card;
                    const newName1 = `${timePrefix}_${makeSafeName(c.assunto)}_cartao${cam}${ext1}`;
                    
                    script += `Rename-Item -Path "${p1}" -NewName "${newName1}" -ErrorAction SilentlyContinue\\n`;
                }
            });

            const blob = new Blob([script], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "FL_Renomear_Massa.ps1";
            a.click();
            URL.revokeObjectURL(url);
        }

        assuntoInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                salvarEAvancar();
            }
        });

        renderCurrent();

    </script>
</body>
</html>
