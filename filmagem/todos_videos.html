<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Fundamentos (Todos os Vídeos)</title>
    <style>
        :root { --bg: #121212; --accent: #ff6b35; --text: #fff; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        h1 { color: var(--accent); margin: 0; }

        /* Categoria: header clicável */
        .cat-header {
            display: flex; align-items: center; gap: 12px;
            margin: 30px 0 0; cursor: pointer; user-select: none;
            border-left: 5px solid var(--accent); padding-left: 15px;
        }
        .cat-header:hover .cat-title { color: var(--accent); }
        .cat-title {
            font-size: 1.6rem; text-transform: uppercase; color: #ddd;
            font-weight: bold; transition: color 0.2s;
        }
        .cat-toggle { font-size: 1.2rem; color: #666; transition: transform 0.25s; }
        .cat-toggle.open { transform: rotate(90deg); }
        .cat-play-btn {
            margin-left: auto;
            background: var(--accent); color: #fff; border: none;
            padding: 8px 18px; border-radius: 6px; font-size: 0.9rem;
            font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap;
        }
        .cat-play-btn:hover { background: #fa5216; transform: translateY(-1px); }

        /* Grid de vídeos (colapsável) */
        .cat-body { overflow: hidden; max-height: 0; transition: max-height 0.35s ease; }
        .cat-body.open { max-height: 99999px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; margin-bottom: 10px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        video { width: 100%; height: 380px; object-fit: contain; background: #000; }
        .card-info { padding: 10px 14px; }
        .vid-filename { font-size: 0.82rem; color: #bbb; word-break: break-all; line-height: 1.3; }

        .loading { color: #666; font-style: italic; padding: 40px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center; gap: 15px; flex-wrap:wrap;">
            <img src="https://footballlab.com.br/favicon.svg" alt="FL" style="width: 48px; height: 48px;">
            <div style="display:flex; flex-direction:column;">
                <h2 style="font-size: 1.4rem; margin:0; font-family: 'Outfit', sans-serif; color:white;">FL Training System</h2>
                <span style="color:var(--accent); font-weight:bold; font-size: 0.9rem;">Galeria de Fundamentos</span>
            </div>
            <div style="margin-left:15px; display:flex; gap:10px;">
                <a href="../" style="color:#aaa; text-decoration:none; padding:8px 15px; border:1px solid #444; border-radius:6px; font-size:0.9rem; transition:0.3s;"
                   onmouseover="this.style.background='#333'; this.style.color='#fff';"
                   onmouseout="this.style.background='transparent'; this.style.color='#aaa';">⬅ Voltar para o App</a>
                <a href="filmagem_3003.pdf" target="_blank" style="color:#aaa; text-decoration:none; padding:8px 15px; border:1px solid #444; border-radius:6px; font-size:0.9rem; transition:0.3s;"
                   onmouseover="this.style.background='#333'; this.style.color='#fff';"
                   onmouseout="this.style.background='transparent'; this.style.color='#aaa';">📄 Filme 3003</a>
            </div>
        </div>
        <div style="color:#888; font-size:0.9rem;" id="total-label"></div>
    </div>

    <div id="content"><p class="loading">Carregando catálogo...</p></div>

    <script>
        fetch('../RepVid/catalog.json')
            .then(r => r.json())
            .then(catalog => renderCatalog(catalog))
            .catch(() => {
                document.getElementById('content').innerHTML =
                    '<p class="loading" style="color:#f44">Erro ao carregar catalog.json</p>';
            });

        function renderCatalog(catalog) {
            const cats = Object.keys(catalog);
            const totalVideos = cats.reduce((s, c) => s + catalog[c].length, 0);
            document.getElementById('total-label').innerText = `${totalVideos} vídeos`;

            let html = '';
            cats.forEach(cat => {
                const videos = [...catalog[cat]].sort();
                if (videos.length === 0) return;

                const catId = 'cat-' + cat.replace(/\s+/g, '-');
                const folder = `../RepVid/${encodeURIComponent(cat)}`;
                const playUrl = `player.html?cat=${encodeURIComponent(cat)}`;

                html += `
                <div>
                    <div class="cat-header" onclick="toggleCat('${catId}')">
                        <span class="cat-toggle" id="toggle-${catId}">▶</span>
                        <span class="cat-title" id="title-${catId}">${cat} (${videos.length})</span>
                        <button class="cat-play-btn" onclick="event.stopPropagation(); window.location.href='${playUrl}'">
                            ▶ Tocar todos da categoria
                        </button>
                    </div>
                    <div class="cat-body" id="${catId}">
                        <div class="grid">
                            ${videos.map(file => `
                            <div class="card">
                                <video controls preload="metadata">
                                    <source src="${folder}/${encodeURIComponent(file)}" type="video/mp4">
                                </video>
                                <div class="card-info">
                                    <span class="vid-filename">${file}</span>
                                </div>
                            </div>`).join('')}
                        </div>
                    </div>
                </div>`;
            });

            document.getElementById('content').innerHTML = html;
            updateDurations();
        }

        function toggleCat(id) {
            const body = document.getElementById(id);
            const toggle = document.getElementById('toggle-' + id);
            const isOpen = body.classList.contains('open');
            body.classList.toggle('open', !isOpen);
            toggle.classList.toggle('open', !isOpen);
        }

        function updateDurations() {
            const formatTime = s => {
                if (!s || isNaN(s)) return '';
                const m = Math.floor(s / 60), sec = Math.floor(s % 60);
                return `${m}:${sec < 10 ? '0' : ''}${sec}`;
            };

            document.querySelectorAll('.cat-body').forEach(body => {
                const catId = body.id;
                const titleEl = document.getElementById('title-' + catId);
                const baseText = titleEl.innerText;
                const videos = Array.from(body.querySelectorAll('video'));
                let total = 0, loaded = 0;

                const check = () => {
                    if (loaded === videos.length && total > 0)
                        titleEl.innerText = `${baseText} — ${formatTime(total)}`;
                };

                videos.forEach(v => {
                    if (v.readyState >= 1) { total += v.duration; loaded++; check(); }
                    else {
                        v.addEventListener('loadedmetadata', () => { total += v.duration; loaded++; check(); });
                        v.addEventListener('error', () => { loaded++; check(); });
                    }
                });
            });
        }
    </script>
</body>
</html>
