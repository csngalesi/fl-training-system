        :root { --bg: #121212; --accent: #ff6b35; --text: #fff; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;}
        h1 { color: var(--accent); margin: 0; }
        .nav-links { display: flex; gap: 10px; flex-wrap:wrap; }
        .nav-links a { color: #fff; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; background: #333; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { background: var(--accent); }
        .section-title { font-size: 1.8rem; margin: 30px 0 15px; border-left: 5px solid var(--accent); padding-left: 15px; text-transform: uppercase; color: #ddd; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        video { width: 100%; height: 400px; object-fit: contain; background: #000; }
        .card-info { padding: 12px 15px; display: flex; flex-direction: column; gap: 6px; }
        .vid-filename { font-size: 0.82rem; color: #bbb; word-break: break-all; line-height: 1.3; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; }
        .star { color: #ffeb3b; font-size: 1.2rem; }

        .play-all-btn {
            background: #ff6b35; color: white; padding: 15px 30px; border-radius: 8px; text-decoration: none;
            font-weight: bold; font-size: 1.2rem; display: inline-block; transition: 0.3s; box-shadow: 0 4px 10px rgba(255,107,53,0.4);
        }
        .play-all-btn:hover { background: #fa5216; transform: translateY(-2px); }
        .hero { text-align: center; margin-bottom: 40px; margin-top: 10px; }
    </style>
</head>

        // Conta totais
        const totalVideos = categories.reduce((acc, cat) => acc + cat.videos.length, 0);
        document.getElementById('nav-todos').innerText = `Todos (${totalVideos})`;

        // Gera HTML com vídeos ordenados por nome dentro de cada categoria
        let html = '';
        categories.forEach(cat => {
            const sorted = [...cat.videos].sort();
            const baseText = `${cat.label} (${sorted.length})`;

            html += `<div class="category-block">`;
            html += `<h2 class="section-title" data-base-text="${baseText}">${baseText} - Calculando tempo...</h2>`;
            html += `<div class="grid">`;

            sorted.forEach(file => {
                html += `
                <div class="card">
                    <video controls preload="metadata"><source src="${cat.folder}/${encodeURIComponent(file)}" type="video/mp4"></video>
                    <div class="card-info">
                        <span class="vid-filename">${file}</span>
                    </div>
                </div>`;
            });

            html += `</div></div>`;
        });

        document.getElementById('content').innerHTML = html;

        // Calcula duração total por categoria
        function updateCategoryDurations() {
            const formatTime = (seconds) => {
                if (isNaN(seconds) || seconds === 0) return "0:00";
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            document.querySelectorAll('.category-block').forEach(block => {
                const titleEl = block.querySelector('.section-title');
                const videos = Array.from(block.querySelectorAll('video'));
                let totalSeconds = 0;
                let loadedCount = 0;

                if (videos.length === 0) return;

                const checkDone = () => {
                    if (loadedCount === videos.length) {
                        titleEl.innerText = `${titleEl.getAttribute('data-base-text')} - ${formatTime(totalSeconds)}`;
                    }
                };

                videos.forEach(vid => {
                    if (vid.readyState >= 1) {
                        totalSeconds += vid.duration;
                        loadedCount++;
                        checkDone();
                    } else {
                        vid.addEventListener('loadedmetadata', () => { totalSeconds += vid.duration; loadedCount++; checkDone(); });
                        vid.addEventListener('error', () => { loadedCount++; checkDone(); });
                    }
                });
            });
        }

        updateCategoryDurations();
    </script>
</body>
</html>
