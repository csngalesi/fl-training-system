<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Fundamentos (Todos os Vídeos)</title>
    <style>
        :root { --bg: #121212; --accent: #ff6b35; --text: #fff; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; padding-bottom: 90px; }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }

        .cat-header { display: flex; align-items: center; gap: 12px; margin: 30px 0 0; cursor: pointer; user-select: none; border-left: 5px solid var(--accent); padding-left: 15px; }
        .cat-header:hover .cat-title { color: var(--accent); }
        .cat-title { font-size: 1.6rem; text-transform: uppercase; color: #ddd; font-weight: bold; transition: color 0.2s; }
        .cat-toggle { font-size: 1.2rem; color: #666; transition: transform 0.25s; }
        .cat-toggle.open { transform: rotate(90deg); }
        .cat-play-btn { margin-left: auto; background: var(--accent); color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .cat-play-btn:hover { background: #fa5216; transform: translateY(-1px); }

        .cat-body { overflow: hidden; max-height: 0; transition: max-height 0.35s ease; }
        .cat-body.open { max-height: 99999px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; margin-bottom: 10px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        video { width: 100%; height: 380px; object-fit: contain; background: #000; }

        /* Área de classificação */
        .card-classify { padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #2a2a2a; }
        .classify-row { display: flex; gap: 6px; align-items: center; }
        .rename-input {
            flex: 1; background: #2a2a2a; border: 1px solid #444; border-radius: 5px;
            color: #ddd; font-size: 0.78rem; padding: 5px 8px; outline: none;
            transition: border-color 0.2s;
        }
        .rename-input:focus { border-color: var(--accent); }
        .rename-input.changed { border-color: #4caf50; color: #fff; }
        .star-btn {
            background: none; border: 1px solid #444; border-radius: 5px;
            font-size: 1.1rem; padding: 4px 8px; cursor: pointer; transition: 0.2s;
            line-height: 1;
        }
        .star-btn.active { background: #333; border-color: #ffeb3b; }
        .vid-original { font-size: 0.72rem; color: #555; word-break: break-all; line-height: 1.2; }

        /* Barra flutuante */
        .script-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1a1a1a; border-top: 2px solid var(--accent);
            padding: 14px 24px; display: flex; align-items: center; gap: 16px;
            z-index: 100;
        }
        .script-bar-label { color: #aaa; font-size: 0.9rem; flex: 1; }
        .script-bar-label span { color: var(--accent); font-weight: bold; }
        .gerar-btn { background: var(--accent); color: #fff; border: none; padding: 10px 24px; border-radius: 7px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .gerar-btn:hover { background: #fa5216; }
        .gerar-btn:disabled { background: #444; color: #777; cursor: default; }

        /* Modal do script */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #1e1e1e; border-radius: 10px; padding: 24px; width: 90%; max-width: 760px; max-height: 80vh; display: flex; flex-direction: column; gap: 14px; }
        .modal h3 { margin: 0; color: var(--accent); }
        .modal textarea { flex: 1; min-height: 300px; background: #111; color: #0f0; font-family: monospace; font-size: 0.82rem; border: 1px solid #333; border-radius: 6px; padding: 12px; resize: vertical; outline: none; }
        .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-btns button { padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .btn-copy { background: var(--accent); color: #fff; }
        .btn-copy:hover { background: #fa5216; }
        .btn-close { background: #333; color: #fff; }
        .btn-close:hover { background: #444; }

        .loading { color: #666; font-style: italic; padding: 40px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center; gap: 15px; flex-wrap:wrap;">
            <img src="https://footballlab.com.br/favicon.svg" alt="FL" style="width: 48px; height: 48px;">
            <div style="display:flex; flex-direction:column;">
                <h2 style="font-size: 1.4rem; margin:0; font-family: 'Outfit', sans-serif; color:white;">FL Training System</h2>
                <span style="color:var(--accent); font-weight:bold; font-size: 0.9rem;">Galeria de Fundamentos</span>
            </div>
            <div style="margin-left:15px; display:flex; gap:10px;">
                <a href="../" style="color:#aaa; text-decoration:none; padding:8px 15px; border:1px solid #444; border-radius:6px; font-size:0.9rem; transition:0.3s;"
                   onmouseover="this.style.background='#333'; this.style.color='#fff';"
                   onmouseout="this.style.background='transparent'; this.style.color='#aaa';">⬅ Voltar para o App</a>
                <a href="filmagem_3003.pdf" target="_blank" style="color:#aaa; text-decoration:none; padding:8px 15px; border:1px solid #444; border-radius:6px; font-size:0.9rem; transition:0.3s;"
                   onmouseover="this.style.background='#333'; this.style.color='#fff';"
                   onmouseout="this.style.background='transparent'; this.style.color='#aaa';">📄 Filme 3003</a>
            </div>
        </div>
        <div style="color:#888; font-size:0.9rem;" id="total-label"></div>
    </div>

    <div id="content"><p class="loading">Carregando catálogo...</p></div>

    <!-- Barra flutuante -->
    <div class="script-bar">
        <div class="script-bar-label">Classificador: <span id="change-count">0</span> alterações pendentes</div>
        <button class="gerar-btn" id="gerar-btn" onclick="abrirModal()" disabled>Gerar Script PowerShell</button>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3>📋 Script de Renomeação</h3>
            <p style="color:#aaa; font-size:0.85rem; margin:0;">
                Copie e cole no PowerShell rodando na pasta <code style="color:#ff6b35">fl-training-system</code>:
            </p>
            <textarea id="script-output" readonly></textarea>
            <div class="modal-btns">
                <button class="btn-copy" onclick="copiarScript()">📋 Copiar</button>
                <button class="btn-close" onclick="fecharModal()">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        // changes: { "Categoria/arquivo.mp4": { cat, file, newName, star } }
        const changes = {};

        function updateBar() {
            const n = Object.keys(changes).length;
            document.getElementById('change-count').innerText = n;
            document.getElementById('gerar-btn').disabled = n === 0;
        }

        function onNameChange(cat, file, newName) {
            const key = cat + '/' + file;
            const hasStar = changes[key]?.star || false;
            if (newName !== file || hasStar) {
                changes[key] = { cat, file, newName, star: hasStar };
            } else {
                delete changes[key];
            }
            updateBar();
        }

        function onStarToggle(cat, file, btn) {
            const key = cat + '/' + file;
            const current = changes[key] || { cat, file, newName: file, star: false };
            current.star = !current.star;
            btn.classList.toggle('active', current.star);
            btn.innerText = current.star ? '⭐' : '☆';
            if (current.newName !== file || current.star) {
                changes[key] = current;
            } else {
                delete changes[key];
            }
            updateBar();
        }

        function abrirModal() {
            const lines = [
                '$base = "' + 'fl-training-system\\RepVid"',
                ''
            ];
            for (const [key, c] of Object.entries(changes)) {
                let newName = c.newName || c.file;
                if (c.star && !newName.includes('⭐')) {
                    newName = newName.replace(/\.mp4$/i, '⭐.mp4');
                }
                if (newName !== c.file) {
                    lines.push(`Rename-Item "$base\\${c.cat}\\${c.file}" "${newName}"`);
                }
            }
            lines.push('');
            lines.push('# Depois rode para atualizar o catalogo e fazer deploy:');
            lines.push('powershell -File RepVid\\gerar_catalog.ps1');
            lines.push('git add RepVid/ && git commit -m "refactor: renomear videos classificados" && git push');

            document.getElementById('script-output').value = lines.join('\n');
            document.getElementById('modal').classList.add('open');
        }

        function fecharModal() {
            document.getElementById('modal').classList.remove('open');
        }

        function copiarScript() {
            const ta = document.getElementById('script-output');
            ta.select();
            document.execCommand('copy');
            const btn = document.querySelector('.btn-copy');
            btn.innerText = '✅ Copiado!';
            setTimeout(() => btn.innerText = '📋 Copiar', 2000);
        }

        fetch('../RepVid/catalog.json')
            .then(r => r.json())
            .then(catalog => renderCatalog(catalog))
            .catch(() => {
                document.getElementById('content').innerHTML =
                    '<p class="loading" style="color:#f44">Erro ao carregar catalog.json</p>';
            });

        function renderCatalog(catalog) {
            const cats = Object.keys(catalog);
            const totalVideos = cats.reduce((s, c) => s + catalog[c].length, 0);
            document.getElementById('total-label').innerText = `${totalVideos} vídeos`;

            let html = '';
            cats.forEach(cat => {
                const videos = [...catalog[cat]].sort();
                if (videos.length === 0) return;

                const catId = 'cat-' + cat.replace(/\s+/g, '-');
                const folder = `../RepVid/${encodeURIComponent(cat)}`;
                const playUrl = `player.html?cat=${encodeURIComponent(cat)}`;

                html += `
                <div>
                    <div class="cat-header" onclick="toggleCat('${catId}')">
                        <span class="cat-toggle" id="toggle-${catId}">▶</span>
                        <span class="cat-title" id="title-${catId}">${cat} (${videos.length})</span>
                        <button class="cat-play-btn" onclick="event.stopPropagation(); window.location.href='${playUrl}'">
                            ▶ Tocar todos da categoria
                        </button>
                    </div>
                    <div class="cat-body" id="${catId}">
                        <div class="grid">
                            ${videos.map(file => {
                                const safeFile = file.replace(/'/g, "\\'");
                                const safeCat = cat.replace(/'/g, "\\'");
                                return `
                            <div class="card">
                                <video controls preload="metadata">
                                    <source src="${folder}/${encodeURIComponent(file)}" type="video/mp4">
                                </video>
                                <div class="card-classify">
                                    <div class="classify-row">
                                        <input class="rename-input" type="text"
                                            value="${file.replace(/"/g, '&quot;')}"
                                            title="Novo nome do arquivo"
                                            oninput="this.classList.toggle('changed', this.value !== '${safeFile}'); onNameChange('${safeCat}', '${safeFile}', this.value)">
                                        <button class="star-btn" title="Marcar como destaque"
                                            onclick="onStarToggle('${safeCat}', '${safeFile}', this)">☆</button>
                                    </div>
                                    <div class="vid-original">${file}</div>
                                </div>
                            </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
            });

            document.getElementById('content').innerHTML = html;
            updateDurations();
        }

        function toggleCat(id) {
            const body = document.getElementById(id);
            const toggle = document.getElementById('toggle-' + id);
            const isOpen = body.classList.contains('open');
            body.classList.toggle('open', !isOpen);
            toggle.classList.toggle('open', !isOpen);
        }

        function updateDurations() {
            const fmt = s => { if (!s || isNaN(s)) return ''; const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; };
            document.querySelectorAll('.cat-body').forEach(body => {
                const titleEl = document.getElementById('title-' + body.id);
                const base = titleEl.innerText;
                const vids = Array.from(body.querySelectorAll('video'));
                let total = 0, loaded = 0;
                const check = () => { if (loaded === vids.length && total > 0) titleEl.innerText = `${base} — ${fmt(total)}`; };
                vids.forEach(v => {
                    if (v.readyState >= 1) { total += v.duration; loaded++; check(); }
                    else {
                        v.addEventListener('loadedmetadata', () => { total += v.duration; loaded++; check(); });
                        v.addEventListener('error', () => { loaded++; check(); });
                    }
                });
            });
        }
    </script>
</body>
</html>
