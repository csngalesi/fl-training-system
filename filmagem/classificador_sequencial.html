<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador Sequencial - Football Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 5px;
        }
        h1 { color: #3b82f6; margin: 0; font-size: 2rem; text-transform: uppercase; font-weight: 900;}
        .time-badge {
            background: #ef4444; 
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .card-badge {
            background: #fff;
            color: #000;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: 900;
        }
        .video-container {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            height: 48vh;
        }
        .video-box {
            width: 80%;
            max-width: 1200px;
            background: #000;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 3px solid #334155;
            position: relative;
        }
        
        .ig-overlay {
            position: absolute;
            top: 0; bottom: 0; left: 50%;
            transform: translateX(-50%);
            height: 100%;
            aspect-ratio: 9/16;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.85); 
            pointer-events: none; 
            border: 2px dashed rgba(255,255,255,0.6);
            border-radius: 10px;
            display: none; 
            z-index: 5;
        }
        .ig-overlay::after {
            content: '📱 Framing IG Reels';
            position: absolute;
            top: 15px; left: 15px;
            color: white; font-size: 1rem; font-weight: bold;
            font-family: inherit; background: #e1306c;
            padding: 5px 10px; border-radius: 20px;
        }

        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        
        /* RELACIONADOS GALLERY */
        .related-tray {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            margin-bottom: 15px;
            min-height: 120px;
            justify-content: center;
        }
        .rel-item {
            flex: 0 0 160px;
            border-radius: 8px;
            overflow: hidden;
            background: #1e293b;
            position: relative;
        }
        .rel-item video {
            width: 100%; height: 100px; object-fit: cover;
        }
        .rel-label {
            font-size: 0.8rem; font-weight: bold; padding: 3px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .inputs-row {
            display: flex;
            gap: 20px;
            align-items: center;
            width: 70%;
            max-width: 800px;
        }
        input[type="text"] {
            flex: 1; font-size: 2rem; padding: 15px; border-radius: 10px; border: none; text-align: center; font-family: inherit; font-weight: 700;
        }
        
        .estrela-btn {
            background: transparent; color: #64748b; border: 3px solid #64748b; font-size: 1.8rem; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 900; transition: all 0.3s;
        }
        .estrela-btn.active {
            color: #facc15; background: rgba(250, 204, 21, 0.15); border-color: #facc15; box-shadow: 0 0 15px rgba(250, 204, 21, 0.3);
        }

        .btn-group { display: flex; gap: 15px; }
        button { padding: 15px 30px; font-size: 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; color: #fff; }
        .btn-primary { background: #3b82f6; } .btn-primary:active { background: #2563eb; }
        .btn-secondary { background: #475569; }
        .btn-ig { background: #e1306c; border: 2px solid #ca265d; }
        .btn-export { background: #559c31; margin-top: 5px; box-shadow: 0 4px 15px rgba(85, 156, 49, 0.4); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Classificador Sequencial Absoluto</h1>
        <div class="time-badge" id="timeDisplay">
            <span id="timeText">🕒 10:35:28</span>
            <span class="card-badge" id="cardBadge">CARTÃO 1</span>
        </div>
        <div style="font-size: 1.5rem; font-weight: 700;">Tomada: <span id="counterDisplay">1/259</span></div>
    </div>

    <!-- MAIN PLAYER -->
    <div class="video-container" id="videoContainer">
        <div class="video-box" id="vpbox">
            <video id="mainVid" src="" loop controls autoplay></video>
            <div class="ig-overlay" id="igOverlay"></div>
        </div>
    </div>

    <!-- PISTA DE VÍDEOS DO MESMO TEMA (RELACIONADOS) -->
    <div id="relatedTitle" style="text-align: left; margin-left: 10%; font-weight: bold; color: #94a3b8; display: none;">🎞️ Outros ângulos/takes deste mesmo fundamento:</div>
    <div class="related-tray" id="relatedVideos"></div>

    <div class="controls">
        <div class="inputs-row">
            <button class="estrela-btn" id="estrelaBtn" onclick="toggleEstrela()" title="Marque essa estrela se o lance for um espetáculo para vídeos curtos!">☆ Estrela</button>
            <input type="text" id="assunto" placeholder="Digite o Assunto (Ex: Drible Curto)">
        </div>
        
        <div class="btn-group">
            <button class="btn-secondary" onclick="prevVideo()">⏮️ Anterior</button>
            <button class="btn-ig" onclick="toggleIGMask()">📱 Ligar Lente IG</button>
            <button class="btn-primary" onclick="salvarEAvancar()">Salvar e Avançar ⏭️</button>
            <button class="btn-secondary" onclick="pular()">Pular ⏭️</button>
        </div>
        <button class="btn-export" onclick="exportarScript()">💾 Baixar Script Definitivo (.ps1)</button>
    </div>

    <script src="catalogo_simples.js"></script>

    <script>
        let currentIndex = parseInt(localStorage.getItem('fl_seq_index')) || 0;
        let classifications = JSON.parse(localStorage.getItem('fl_seq_classifications')) || [];
        
        const videoPlayer = document.getElementById('mainVid');
        const timeText = document.getElementById('timeText');
        const cardBadge = document.getElementById('cardBadge');
        const counterDisplay = document.getElementById('counterDisplay');
        const assuntoInput = document.getElementById('assunto');
        const vpBox = document.getElementById('vpbox');
        const igOverlay = document.getElementById('igOverlay');
        const estrelaBtn = document.getElementById('estrelaBtn');
        const relatedVideos = document.getElementById('relatedVideos');
        const relatedTitle = document.getElementById('relatedTitle');
        
        let isEstrela = false;
        let isIGMaskOn = false;

        function toggleIGMask() {
            isIGMaskOn = !isIGMaskOn;
            igOverlay.style.display = isIGMaskOn ? 'block' : 'none';
        }

        function toggleEstrela() {
            isEstrela = !isEstrela;
            estrelaBtn.classList.toggle('active', isEstrela);
            estrelaBtn.innerText = isEstrela ? "⭐ Estrela" : "☆ Estrela";
        }

        // Função mágica para extrair o assunto limpo do nome do arquivo real físico (que já foi renomeado uma vez)
        function extractTopicFromFilename(pathUri) {
            if (!pathUri) return "";
            const filename = pathUri.split('/').pop().split('.')[0];
            
            // Remove sufixo de cartão (_cartao1)
            let clean = filename.replace(/_cartao[12]$/i, '');
            // Remove sufixo de ESTRELA se tiver (_ESTRELA)
            clean = clean.replace(/_ESTRELA$/i, '');
            // Remove prefixo numeral secuencial se houver (ex: 041_)
            clean = clean.replace(/^\\d{3}_/, '');
            
            if (clean.match(/^C\\d{4}$/) || clean.match(/^GUI\\d{4}$/)) return ""; // O arquivo nunca foi classificado (nome original Sony)
            
            // Troca underlines por espaços pra ficar lindão no Input
            return clean.replace(/_/g, ' ');
        }

        function renderRelated(topic) {
            relatedVideos.innerHTML = '';
            if (!topic) {
                relatedTitle.style.display = 'none';
                return;
            }
            relatedTitle.style.display = 'block';

            // Find all videos that contain this topic (slugified) in their filename
            const searchSlug = topic.replace(/ /g, '_').toLowerCase();
            
            const related = videosData.filter(v => {
                const fname = v.Path.substring(v.Path.lastIndexOf('/')+1).toLowerCase();
                return fname.includes(searchSlug) || extractTopicFromFilename(v.Path).toLowerCase() === topic.toLowerCase();
            });

            related.forEach((r, idx) => {
                const color = r.Card === 1 ? '#559c31' : '#3b82f6';
                const isCurrentUrl = r.Path === videosData[currentIndex].Path;
                const borderSz = isCurrentUrl ? '4px solid #facc15' : \`2px solid \${color}\`;
                
                relatedVideos.innerHTML += \`
                    <div class="rel-item" style="border: \${borderSz};">
                        <div class="rel-label" style="background:\${color};">CARTÃO \${r.Card}</div>
                        <!-- We don't autoplay these so it doesn't crash the browser, just visual thumbs! -->
                        <video src="\${r.Path}#t=2.0" style="pointer-events:none;"></video>
                    </div>
                \`;
            });
        }

        function renderCurrent() {
            if (currentIndex >= videosData.length) {
                alert("Todas as tomadas foram revisadas! Você já pode exportar o script.");
                return;
            }

            const item = videosData[currentIndex];
            timeText.innerText = \`🕒 \${item.Time}\`;
            cardBadge.innerText = \`CÂMERA / CARTÃO \${item.Card}\`;
            
            if (item.Card === 1) {
                vpBox.style.borderColor = '#559c31'; cardBadge.style.color = '#559c31';
            } else {
                vpBox.style.borderColor = '#3b82f6'; cardBadge.style.color = '#3b82f6';
            }

            counterDisplay.innerText = (currentIndex + 1) + ' / ' + videosData.length;
            
            // Check if already classified in localStorage
            const existing = classifications.find(c => c.index === currentIndex);
            
            // Recupera a inteligência do nome físico existente pra não ter que digitar do zero!
            const inheritedTopic = extractTopicFromFilename(item.Path);

            if (existing) {
                assuntoInput.value = existing.assunto;
                isEstrela = existing.estrela || false;
            } else {
                // Herda o assunto da "Criação original" do arquivo físico!
                assuntoInput.value = inheritedTopic;
                isEstrela = item.Path.includes("_ESTRELA."); // Lê fisicamente se já for estrela!
            }
            
            estrelaBtn.classList.toggle('active', isEstrela);
            estrelaBtn.innerText = isEstrela ? "⭐ Estrela" : "☆ Estrela";

            // Renderiza o cinto de relacionados 
            renderRelated(assuntoInput.value);

            videoPlayer.src = item.Path;
            videoPlayer.play().catch(e => console.log("Autoplay prevent: ", e));
            assuntoInput.focus();
        }

        // Listener pra atualizar os relacionados se ele digitar algo diferente!
        assuntoInput.addEventListener('keyup', () => {
            renderRelated(assuntoInput.value.trim());
        });

        function salvarEAvancar() {
            const assunto = assuntoInput.value.trim().replace(/[^a-zA-Z0-9 -]/g, "");
            if (!assunto) {
                alert('Digite um assunto para classificar (sem caracteres especiais)!');
                return;
            }

            const item = videosData[currentIndex];
            classifications = classifications.filter(c => c.index !== currentIndex);
            
            classifications.push({
                index: currentIndex,
                assunto: assunto,
                path: item.Path,
                card: item.Card,
                estrela: isEstrela
            });

            localStorage.setItem('fl_seq_classifications', JSON.stringify(classifications));
            localStorage.setItem('fl_seq_index', currentIndex + 1);
            
            currentIndex++;
            renderCurrent();
        }

        function pular() {
            currentIndex++;
            localStorage.setItem('fl_seq_index', currentIndex);
            renderCurrent();
        }

        function prevVideo() {
            if (currentIndex > 0) {
                currentIndex--;
                localStorage.setItem('fl_seq_index', currentIndex);
                renderCurrent();
            }
        }

        function exportarScript() {
            if (classifications.length === 0) {
                alert("Nenhum vídeo classificado ainda!");
                return;
            }

            let script = "# Script Gerado pelo FL Classificador Sequencial\\r\\n";
            script += "# Execute este script no PowerShell para aplicar as NOVAS super tags (Estrela).\\r\\n\\r\\n";

            try {
                classifications.forEach((c, idx) => {
                    const timePrefix = String(idx+1).padStart(3, '0');

                    const toWinPath = (uri) => {
                        if (!uri) return null;
                        let p = decodeURI(uri).replace('file:///', '');
                        return p.split('/').join('\\\\');
                    };

                    const makeSafeName = (name) => name.trim().replace(/ /g, '_');

                    const p1 = toWinPath(c.path);
                    const ext1 = p1.substring(p1.lastIndexOf('.'));
                    const cam = c.card;
                    const safeAssunto = makeSafeName(c.assunto);
                    const estrelaSufixo = c.estrela ? "_ESTRELA" : "";
                    
                    // Exemplo Novo: 041_dominio_parado_cartao1_ESTRELA.mp4
                    const newName1 = \`\${timePrefix}_\${safeAssunto}_cartao\${cam}\${estrelaSufixo}\${ext1}\`;
                    
                    /* Previne que ele tente renomear se o nome já for exatamente o mesmo, evitando erro vermelho no PowerShell */
                    const isAlreadyNamed = p1.endsWith("\\\\" + newName1);
                    if (!isAlreadyNamed) {
                        script += \`Rename-Item -Path "\${p1}" -NewName "\${newName1}" -ErrorAction SilentlyContinue\\r\\n\`;
                    }
                });

                const blob = new Blob([script], { type: "text/plain;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "FL_Renomear_SuperTags.ps1";
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
                alert("Script exportado com sucesso! A tag será colocada DENTRO e NO FINAL do nome do arquivo pra ficar perfeito pra você.");
            } catch (err) {
                alert("Houve um erro convertendo suas classificações: " + err.message);
            }
        }

        assuntoInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                salvarEAvancar();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (document.activeElement === assuntoInput) return;
            if (e.key.toLowerCase() === 's') { toggleEstrela(); }
            if (e.key.toLowerCase() === 'i') { toggleIGMask(); }
        });

        renderCurrent();

    </script>
</body>
</html>
