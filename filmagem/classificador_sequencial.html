<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador Sequencial - Football Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 5px;
        }
        h1 { color: #3b82f6; margin: 0; font-size: 2rem; text-transform: uppercase; font-weight: 900;}
        .time-badge {
            background: #ef4444; /* Vermelho Rec */
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .card-badge {
            background: #fff;
            color: #000;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: 900;
        }
        .video-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            height: 55vh;
        }
        .video-box {
            width: 80%;
            max-width: 1200px;
            background: #000;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 3px solid #334155;
            position: relative;
        }
        
        /* OVERLAY DO INSTAGRAM REELS (9:16) */
        .ig-overlay {
            position: absolute;
            top: 0; bottom: 0; left: 50%;
            transform: translateX(-50%);
            height: 100%;
            aspect-ratio: 9/16;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.85); /* Máscara escurecedora gigantesta ao redor do centro */
            pointer-events: none; /* Deixa os cliques passarem pro vídeo */
            border: 2px dashed rgba(255,255,255,0.6);
            border-radius: 10px;
            display: none; /* Escondido por padrão */
            z-index: 5;
        }
        .ig-overlay::after {
            content: '📱 Framing IG Reels';
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            font-family: inherit;
            background: #e1306c;
            padding: 5px 10px;
            border-radius: 20px;
            text-shadow: none;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .inputs-row {
            display: flex;
            gap: 20px;
            align-items: center;
            width: 70%;
            max-width: 800px;
        }
        input[type="text"] {
            flex: 1;
            font-size: 2rem;
            padding: 15px;
            border-radius: 10px;
            border: none;
            text-align: center;
            font-family: inherit;
            font-weight: 700;
        }
        
        /* BOTÃO ESTRELA (FAVORITO) */
        .estrela-btn {
            background: transparent;
            color: #64748b;
            border: 3px solid #64748b;
            font-size: 1.8rem;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 900;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .estrela-btn.active {
            color: #facc15;
            background: rgba(250, 204, 21, 0.15);
            border-color: #facc15;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }
        button {
            padding: 15px 30px;
            font-size: 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            color: #fff;
        }
        .btn-primary { background: #3b82f6; }
        .btn-primary:active { background: #2563eb; }
        .btn-secondary { background: #475569; }
        .btn-ig { background: #e1306c; border: 2px solid #ca265d; }
        .btn-export { background: #559c31; margin-top: 5px; box-shadow: 0 4px 15px rgba(85, 156, 49, 0.4); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Classificador Sequencial Absoluto</h1>
        <div class="time-badge" id="timeDisplay">
            <span id="timeText">🕒 10:35:28</span>
            <span class="card-badge" id="cardBadge">CARTÃO 1</span>
        </div>
        <div style="font-size: 1.5rem; font-weight: 700;">Tomada: <span id="counterDisplay">1/259</span></div>
    </div>

    <div class="video-container" id="videoContainer">
        <div class="video-box" id="vpbox">
            <video id="mainVid" src="" loop controls autoplay></video>
            <!-- Moldura Instagram -->
            <div class="ig-overlay" id="igOverlay"></div>
        </div>
    </div>

    <div class="controls">
        <div class="inputs-row">
            <button class="estrela-btn" id="estrelaBtn" onclick="toggleEstrela()" title="Marque essa estrela se o lance for um espetáculo para vídeos curtos!">☆ Estrela</button>
            <input type="text" id="assunto" placeholder="Digite o Assunto (Ex: Drible Curto)">
        </div>
        
        <div class="btn-group">
            <button class="btn-secondary" onclick="prevVideo()">⏮️ Anterior</button>
            <button class="btn-ig" onclick="toggleIGMask()">📱 Ligar / Desligar Lente IG</button>
            <button class="btn-primary" onclick="salvarEAvancar()">Salvar e Avançar ⏭️</button>
            <button class="btn-secondary" onclick="pular()">Pular ⏭️</button>
        </div>
        <button class="btn-export" onclick="exportarScript()">💾 Baixar Script de Renomeio Definitivo (.ps1)</button>
    </div>

    <!-- Carrega o catálogo gerado pelo PowerShell -->
    <script src="catalogo_simples.js"></script>

    <script>
        let currentIndex = parseInt(localStorage.getItem('fl_seq_index')) || 0;
        let classifications = JSON.parse(localStorage.getItem('fl_seq_classifications')) || [];
        
        const videoPlayer = document.getElementById('mainVid');
        const timeText = document.getElementById('timeText');
        const cardBadge = document.getElementById('cardBadge');
        const counterDisplay = document.getElementById('counterDisplay');
        const assuntoInput = document.getElementById('assunto');
        const vpBox = document.getElementById('vpbox');
        const igOverlay = document.getElementById('igOverlay');
        const estrelaBtn = document.getElementById('estrelaBtn');
        
        let isEstrela = false;
        let isIGMaskOn = false;

        function toggleIGMask() {
            isIGMaskOn = !isIGMaskOn;
            igOverlay.style.display = isIGMaskOn ? 'block' : 'none';
        }

        function toggleEstrela() {
            isEstrela = !isEstrela;
            estrelaBtn.classList.toggle('active', isEstrela);
            estrelaBtn.innerText = isEstrela ? "⭐ Estrela" : "☆ Estrela";
        }

        function renderCurrent() {
            if (currentIndex >= videosData.length) {
                alert("Todas as tomadas foram revisadas! Você já pode exportar o script.");
                return;
            }

            const item = videosData[currentIndex];
            timeText.innerText = `🕒 ${item.Time}`;
            cardBadge.innerText = `CÂMERA / CARTÃO ${item.Card}`;
            
            // Mudar cor da borda de acordo com o cartão para facilitação visual
            if (item.Card === 1) {
                vpBox.style.borderColor = '#559c31'; // Verde Cartão 1
                cardBadge.style.color = '#559c31';
            } else {
                vpBox.style.borderColor = '#3b82f6'; // Azul Cartão 2
                cardBadge.style.color = '#3b82f6';
            }

            counterDisplay.innerText = (currentIndex + 1) + ' / ' + videosData.length;
            
            // Check if already classified
            const existing = classifications.find(c => c.index === currentIndex);
            if (existing) {
                assuntoInput.value = existing.assunto;
                isEstrela = existing.estrela || false;
            } else {
                assuntoInput.value = '';
                isEstrela = false;
            }
            // Sync UI toggle for Star
            estrelaBtn.classList.toggle('active', isEstrela);
            estrelaBtn.innerText = isEstrela ? "⭐ Estrela" : "☆ Estrela";

            // Render video
            videoPlayer.src = item.Path;
            videoPlayer.play().catch(e => console.log("Autoplay prevent: ", e));
            assuntoInput.focus();
        }

        function salvarEAvancar() {
            const assunto = assuntoInput.value.trim().replace(/[^a-zA-Z0-9 -]/g, "");
            if (!assunto) {
                alert('Digite um assunto para classificar (sem caracteres especiais)!');
                return;
            }

            const item = videosData[currentIndex];
            
            classifications = classifications.filter(c => c.index !== currentIndex);
            
            classifications.push({
                index: currentIndex,
                assunto: assunto,
                path: item.Path,
                card: item.Card,
                estrela: isEstrela
            });

            localStorage.setItem('fl_seq_classifications', JSON.stringify(classifications));
            localStorage.setItem('fl_seq_index', currentIndex + 1);
            
            currentIndex++;
            renderCurrent();
        }

        function pular() {
            currentIndex++;
            localStorage.setItem('fl_seq_index', currentIndex);
            renderCurrent();
        }

        function prevVideo() {
            if (currentIndex > 0) {
                currentIndex--;
                localStorage.setItem('fl_seq_index', currentIndex);
                renderCurrent();
            }
        }

        function exportarScript() {
            if (classifications.length === 0) {
                alert("Nenhum vídeo classificado ainda!");
                return;
            }

            let script = "# Script Gerado pelo FL Classificador Sequencial\r\n";
            script += "# Execute este script no PowerShell para aplicar os nomes definitivamente.\r\n\r\n";

            try {
                classifications.forEach((c, idx) => {
                    const timePrefix = String(idx+1).padStart(3, '0');

                    const toWinPath = (uri) => {
                        if (!uri) return null;
                        let p = decodeURI(uri).replace('file:///', '');
                        return p.split('/').join('\\');
                    };

                    const makeSafeName = (name) => name.trim().replace(/ /g, '_');

                    const p1 = toWinPath(c.path);
                    const ext1 = p1.substring(p1.lastIndexOf('.'));
                    const cam = c.card;
                    const safeAssunto = makeSafeName(c.assunto);
                    const estrelaTag = c.estrela ? "ESTRELA_" : "";
                    
                    const newName1 = `${timePrefix}_${estrelaTag}${safeAssunto}_cartao${cam}${ext1}`;
                    script += `Rename-Item -Path "${p1}" -NewName "${newName1}" -ErrorAction SilentlyContinue\r\n`;
                });

                const blob = new Blob([script], { type: "text/plain;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "FL_Renomear_Sequencial.ps1";
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
                alert("Script exportado! As modificações com Estrela estarão nos nomes dos arquivos.");
            } catch (err) {
                alert("Houve um erro convertendo suas classificações: " + err.message);
            }
        }

        assuntoInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                salvarEAvancar();
            }
        });

        // Toggles by Spacebar only if video or document has focus without breaking typing
        document.addEventListener('keydown', (e) => {
            if (document.activeElement === assuntoInput) return;
            // Hotkey for Star could be 'S' optionally!
            if (e.key.toLowerCase() === 's') {
                toggleEstrela();
            }
            if (e.key.toLowerCase() === 'i') {
                toggleIGMask();
            }
        });

        renderCurrent();

    </script>
</body>
</html>
