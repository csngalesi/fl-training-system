        });

        document.getElementById('content').innerHTML = html;

        // Função engenhosa que escuta quando o vídeo carrega os metadados e calcula a duração total do bloco
        function updateCategoryDurations() {
            const formatTime = (seconds) => {
                if (isNaN(seconds) || seconds === 0) return "0:00";
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            const blocks = document.querySelectorAll('.category-block');
            blocks.forEach(block => {
                const titleEl = block.querySelector('.section-title');
                const videos = Array.from(block.querySelectorAll('video'));
                
                let totalSeconds = 0;
                let loadedCount = 0;

                if (videos.length === 0) return;

                const checkDone = () => {
                    if (loadedCount === videos.length) {
                        const baseText = titleEl.getAttribute('data-base-text');
                        titleEl.innerText = `${baseText} - ${formatTime(totalSeconds)}`;
                    }
                };

                videos.forEach(vid => {
                    if (vid.readyState >= 1) { // metadados ja carregados
                        totalSeconds += vid.duration;
                        loadedCount++;
                        checkDone();
                    } else {
                        vid.addEventListener('loadedmetadata', () => {
                            totalSeconds += vid.duration;
                            loadedCount++;
                            checkDone();
                        });
                        vid.addEventListener('error', () => {
                            loadedCount++;
                            checkDone();
                        });
                    }
                });
            });
        }
        
        // Dispara a rotina de somatório de tempos
        updateCategoryDurations();
