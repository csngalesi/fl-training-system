<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bloco D - Football Lab</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

        body { 
            font-family: 'Inter', sans-serif; 
            background: #020617; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }

        .infographic { 
            width: 1040px; height: 720px; background: #0f172a; position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-radius: 16px; overflow: hidden; 
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); 
            background-size: 20px 20px; 
            color: #f8fafc;
        }

        .header {
            position: absolute;
            top: 40px;
            left: 50px;
            width: 750px;
            z-index: 10;
        }

        .header h1 {
            font-weight: 900;
            font-size: 34px;
            margin: 0;
            color: #f8fafc;
            letter-spacing: -0.5px;
        }
        
        .header p {
            font-size: 18px;
            font-weight: 500;
            margin-top: 15px;
            color: #cbd5e1;
            line-height: 1.5;
        }

        .logo {
            position: absolute;
            top: 40px;
            right: 50px;
            width: 180px;
            z-index: 10;
        }

        .flow-container {
            position: absolute;
            top: 250px;
            left: 50px;
            width: 940px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            z-index: 10;
        }

        .step-card {
            background: #1e293b;
            border-top: 6px solid #3b82f6;
            border-radius: 16px;
            padding: 40px 30px;
            width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            box-sizing: border-box;
            transition: transform 0.3s ease;
        }
        
        .step-card:hover {
            transform: translateY(-5px);
        }

        .step-card.stage-2 {
            border-top-color: #ef4444; /* Vermelho representando pressão */
        }

        .step-icon {
            font-size: 80px;
            margin-bottom: 25px;
            color: #cbd5e1;
            height: 80px;
        }
        
        .stage-1 .step-icon { color: #3b82f6; }

        .step-card h3 {
            font-size: 22px;
            font-weight: 800;
            color: #f8fafc;
            margin: 0 0 10px 0;
        }

        .step-card p {
            font-size: 16px;
            font-weight: 500;
            color: #94a3b8;
            margin: 0;
        }

        .arrow {
            font-size: 60px;
            color: #475569;
        }
        
        .arrow-right-half {
            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 60px;
            color: #334155;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="infographic">
        <img src="../assets/img/logo-football-lab.svg" alt="Football Lab" class="logo">

        <div class="header">
            <h1>Bloco D: Contextualização Tática</h1>
            <p>Os fundamentos (passe, recepção, condução, finalização, controle, drible) nunca habitam o vácuo. Eles são imediatamente testados na realidade do jogo.</p>
        </div>

        <div class="flow-container">
            <div class="step-card stage-1">
                <div class="step-icon">
                    <i class="fa-solid fa-person-running"></i> 
                    <i class="fa-solid fa-caret-right" style="font-size:40px;margin: 0 10px;color:#cbd5e1"></i> 
                    <i class="fa-solid fa-exclamation-triangle" style="font-size:60px;color:#f59e0b"></i>
                </div>
                <h3>Passo 1: Fundamento Isolado</h3>
                <p>(Ex: Recepção e Passe)</p>
            </div>

            <div class="arrow"><i class="fa-solid fa-arrow-right"></i></div>

            <div class="step-card stage-2" style="position:relative;">
                <div class="step-icon">
                    <!-- Custom layout mimicking 2 blue players vs 1 red -->
                    <div style="display:flex; justify-content:center; align-items:center;">
                        <i class="fa-solid fa-user-group" style="color:#3b82f6;"></i>
                        <i class="fa-solid fa-bolt" style="font-size:30px; margin:0 15px; color:#f59e0b;"></i>
                        <i class="fa-solid fa-user-ninja" style="color:#ef4444;"></i>
                    </div>
                </div>
                <h3>Passo 2: Pressão Cognitiva</h3>
                <p style="color:#38bdf8;">(Adição de tomada de decisão)</p>
                <div class="arrow-right-half"><i class="fa-solid fa-arrow-right"></i></div>
            </div>
        </div>
    </div>
</body>
</html>
