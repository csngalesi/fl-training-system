<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Lab - Painel de Fotos V3 (Aniversário)</title>
    <!-- Força a TV a recarregar a página sozinha a cada 5 minutos (300 segundos).
         Assim, quando você subir fotos novas pro Vercel, a TV já engole a atualização! -->
    <meta http-equiv="refresh" content="300">
    
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Usamos slide 2 de fundo com uma textura super escura por cima para dar foco no mural de fotos */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('assets/img/slide%202.jpg') center/cover no-repeat;
            background-color: #111;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .slideshow-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .photo-slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .photo-slide.active {
            opacity: 1;
        }
        
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            width: 90%;
            height: 80%;
            margin-top: 2%; /* para desgarrar um pouco do teto */
        }

        .grid-item {
            border-radius: 12px;
            /* Box shadow para simular porta-retrato ou tela profunda */
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            /* Usamos contain para garantir que a foto retrato não perca cabeças/pés */
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            /* Fundo sutil para as partes 16:9 que sobrarem nas bordas das fotos retrato */
            background-color: rgba(255, 255, 255, 0.05);
            width: 100%;
            height: 100%;
            transition: transform 0.3s;
        }

        .grid-item:hover {
            transform: scale(1.05); /* Um efeitinho leve se alguém encostar ou passar mouse */
        }

        .footer-bar {
            position: absolute;
            bottom: 30px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5%;
        }

        .slide-counter {
            font-size: 35px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 20px;
            border-radius: 10px;
        }

        .marca-dagua {
            font-size: 55px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 2px 2px 15px rgba(0,0,0,0.9);
            text-transform: uppercase;
            text-align: right;
        }
    </style>
</head>

<body>
    
    <!-- Onde os grids de fotos vao cruzar em fade-in -->
    <div id="slideshow" class="slideshow-wrapper"></div>
    
    <!-- Rodapé contendo o Contador de Slides na esquerda, e a Assinatura na direita -->
    <div class="footer-bar">
        <div class="slide-counter" id="slide-counter">Página 1 / 1</div>
        <div class="marca-dagua">Niver Bruno e Pietro 🎂</div>
    </div>

    <script>
        const container = document.getElementById('slideshow');
        const counterElement = document.getElementById('slide-counter');
        const CHUNK_SIZE = 12; // 12 fotos por slide (Mural 4x3)

        // Busca silenciosamente a lista de fotos da API rodando na Vercel
        fetch('/api/fotos')
            .then(response => response.json())
            .then(fotos => {
                const totalSlides = Math.ceil(fotos.length / CHUNK_SIZE);
                
                if (!fotos || fotos.length === 0) {
                    container.innerHTML = '<h1 style="color:white;text-align:center;margin-top:20%">Aguardando fotos...</h1>';
                    counterElement.style.display = 'none';
                    return;
                }

                // Fatiar a lista de fotos em blocos de 12 para formar os slides
                for (let i = 0; i < totalSlides; i++) {
                    const slide = document.createElement('div');
                    slide.className = 'photo-slide' + (i === 0 ? ' active' : '');
                    
                    const grid = document.createElement('div');
                    grid.className = 'photo-grid';
                    
                    const currentFotos = fotos.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
                    
                    currentFotos.forEach(foto => {
                        const item = document.createElement('div');
                        item.className = 'grid-item';
                        item.style.backgroundImage = `url('${foto.replace(/'/g, "\\'")}')`;
                        grid.appendChild(item);
                    });
                    
                    slide.appendChild(grid);
                    container.appendChild(slide);
                }

                const slideElements = document.querySelectorAll('.photo-slide');
                let current = 0;

                function updateCounterLabel() {
                    if (counterElement) {
                        counterElement.innerHTML = `Página ${current + 1} de ${totalSlides}`;
                    }
                }
                updateCounterLabel(); // Seta inicial

                // Roda o carrossel se tiver mais de 1 página
                if (totalSlides > 1) {
                    setInterval(() => {
                        slideElements[current].classList.remove('active');
                        current = (current + 1) % slideElements.length;
                        slideElements[current].classList.add('active');
                        updateCounterLabel();
                    }, 10000); 
                }
            })
            .catch(err => {
                console.error("Erro ao carregar as fotos da Vercel:", err);
                container.innerHTML = '<h1 style="color:white;text-align:center;margin-top:20%">Erro ao carregar fotos.</h1>';
            });
    </script>

</body>
</html>
