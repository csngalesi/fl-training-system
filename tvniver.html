<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Lab - TV Portal (Aniversário)</title>
    <!-- Usaremos a mesma fonte que já deve estar rolando no projeto principal -->
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=Montserrat:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/tv.css">
</head>

<body>

    <!-- Slide 1: Welcome -->
    <div id="slide-video" class="tv-slide active">
        <div class="overlay-text" style="display: flex; flex-direction: column; align-items: flex-start; margin-left: 100px;">
            <img src="assets/img/logo-football-lab.svg" alt="FL Logo"
                style="width: 700px; margin-bottom: 0px;">
            <p style="font-size: 3rem; margin-top: -15px;">Gerando sua melhor versão</p>
        </div>
    </div>

    <!-- Slide 2: Playlist de Treinos -->
    <div id="slide-birthday" class="tv-slide">
        <div class="content-wrapper">
            <h2 style="font-size: 3rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); margin-bottom: 20px; margin-top: 10px;">Bons Treinos!</h2>
            <div style="display: inline-block; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); overflow: hidden; max-width: 95%; max-height: 75vh; margin-top: 10px;">
                <video id="playlist-player" style="display: block; max-height: 75vh; height: 100%; width: auto; max-width: 100%;" muted playsinline></video>
            </div>
        </div>
    </div>

    <!-- Barra inferior (Ticker) rodando notícias/avisos -->
    <div class="ticker-wrap">
        <div class="ticker">
            <div class="ticker__item">MATRÍCULAS ABERTAS</div>
        </div>
    </div>

    <!-- Injeta o motor do portal da TV -->
    <script src="js/tv.js"></script>
</body>

</html>
